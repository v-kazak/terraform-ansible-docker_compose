---
services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./app/index.html:/usr/share/nginx/html/index.html:ro
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3