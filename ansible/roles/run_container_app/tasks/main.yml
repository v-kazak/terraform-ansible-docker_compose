- name: Создаём директория хранения файлов для конфига nginx
  ansible.builtin.file:
    path: /home/{{ user_name }}/config
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'

- name: Копируем compose файл для запуска
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: /home/{{ user_name }}/{{ item.dest }}
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
  loop:
    - { src: 'compose.yml', dest: 'compose.yml' }
    - { src: 'nginx.conf', dest: 'config/nginx.conf' }

- name: Запускаем контейнер с помощью docker-compose
  community.docker.docker_compose_v2:
    project_src: /home/{{ user_name }}
    state: present
    pull: always