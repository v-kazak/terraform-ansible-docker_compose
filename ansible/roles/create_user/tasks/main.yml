- name: Создаём пользователя {{ deployer_user }}
  ansible.builtin.user:
    name: "{{ deployer_user }}"
    state: present
    shell: /bin/bash
    create_home: true
    groups:
      - sudo
      - docker
    append: true

- name: Кладём публичный ключ в authorized_keys для пользователя deploy
  ansible.posix.authorized_key:
    user: "{{ deployer_user }}"
    state: present
    key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

- name: Настраиваем беспарольный sudo для пользователя deploy
  ansible.builtin.copy:
    dest: /etc/sudoers.d/{{ deployer_user }}
    content: '{{ deployer_user }} ALL=(ALL) NOPASSWD: ALL'
    mode: '0440'
    validate: '/usr/sbin/visudo -cf %s'

- name: Запрещаем вход по паролю для всех пользователей
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?\s*PasswordAuthentication'
    line: 'PasswordAuthentication no'
    backup: true
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart ssh